                     <p>welcome back! please enter your</p>

                        <div class="checkbox-container">

                      Google</button>

                    </form>
                     <form class="register">
                        <h2>create your account?</h2>
                     <p>User your email to register</p>
                      <div class="input">
                        <label for="name"><i id="icono"class="fa-solid fa-user"></i>Your name</label>

                     </div>
                     <div class="input">
                        <label for="email"><i id="icono" class="fa-solid fa-envelope"></i>Email</label>

                     </div>
                     <div class="input">
                        <label for="password"><i id="icono" class="fa-solid fa-lock"></i>Password</label>
                        <input type="password" name="password" id="password" placeholder="Enter your password">
                     </div>
            
                     <div class="buttons">
                        <button>Register</button>
                        <button> <img src=".vscode/IC-google.svg" class="icon-google">
                      Google</button>
                      </div>
                     <p class="account">Already have an account?<a href="#" id="sign-in">Log in</a></p>
